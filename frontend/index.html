<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Clinic — Voice Appointment Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --surface: #111827;
            --surface2: #1a2236;
            --accent: #22d3ee;
            --accent-glow: rgba(34, 211, 238, 0.15);
            --green: #34d399;
            --red: #f87171;
            --text: #e2e8f0;
            --text-dim: #64748b;
            --text-muted: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        .ambient {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
        }
        .ambient::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(34,211,238,0.07) 0%, transparent 70%);
            top: -200px; right: -100px;
            animation: drift 20s ease-in-out infinite alternate;
        }
        .ambient::after {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(52,211,153,0.05) 0%, transparent 70%);
            bottom: -150px; left: -100px;
            animation: drift 25s ease-in-out infinite alternate-reverse;
        }
        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.1); }
        }

        .app {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            height: 100vh; max-width: 480px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 28px 20px 12px;
        }
        .header .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem; font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.5px;
        }
        .header .logo span { color: var(--text); font-weight: 600; }
        .header .tagline {
            color: var(--text-dim);
            font-size: 0.8rem; margin-top: 4px;
            letter-spacing: 0.5px;
        }

        .doctors {
            display: flex; gap: 10px; padding: 8px 16px;
            justify-content: center;
        }
        .doc {
            background: var(--surface);
            border: 1px solid rgba(34,211,238,0.1);
            border-radius: 14px;
            padding: 12px 16px;
            flex: 1; max-width: 200px;
            text-align: center;
            transition: all 0.3s;
        }
        .doc:hover {
            border-color: rgba(34,211,238,0.3);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .doc h3 {
            font-size: 0.85rem; font-weight: 600;
            color: var(--text); margin-bottom: 2px;
        }
        .doc .specialty {
            font-size: 0.7rem; color: var(--accent);
            font-weight: 500; letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .doc .hours {
            font-size: 0.65rem; color: var(--text-muted);
            margin-top: 3px;
        }

        .chat {
            flex: 1; overflow-y: auto;
            padding: 12px 16px;
            display: flex; flex-direction: column;
            gap: 8px;
            mask-image: linear-gradient(transparent 0%, black 3%, black 97%, transparent 100%);
            -webkit-mask-image: linear-gradient(transparent 0%, black 3%, black 97%, transparent 100%);
        }
        .chat::-webkit-scrollbar { width: 3px; }
        .chat::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }

        .bubble {
            max-width: 85%; padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.9rem; line-height: 1.5;
            animation: bubbleIn 0.3s ease-out;
            word-wrap: break-word;
        }
        @keyframes bubbleIn {
            from { opacity: 0; transform: translateY(8px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .bubble.ai {
            align-self: flex-start;
            background: var(--surface2);
            border: 1px solid rgba(255,255,255,0.04);
            border-bottom-left-radius: 6px;
            color: var(--text);
        }
        .bubble.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #0ea5e9, #06b6d4);
            border-bottom-right-radius: 6px;
            color: white;
        }
        .bubble.confirmed {
            align-self: flex-start;
            background: linear-gradient(135deg, rgba(52,211,153,0.15), rgba(34,211,238,0.1));
            border: 1px solid rgba(52,211,153,0.3);
            border-bottom-left-radius: 6px;
        }
        .bubble.confirmed::before {
            content: '✅ ';
        }

        .voice-area {
            display: flex; flex-direction: column;
            align-items: center;
            padding: 16px 20px 10px;
        }

        .orb-container {
            position: relative;
            width: 100px; height: 100px;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .orb-ring {
            position: absolute; inset: 0;
            border-radius: 50%;
            border: 2px solid rgba(34,211,238,0.2);
            transition: all 0.5s;
        }
        .orb-ring:nth-child(2) { inset: -8px; border-color: rgba(34,211,238,0.1); }
        .orb-ring:nth-child(3) { inset: -16px; border-color: rgba(34,211,238,0.05); }

        .orb {
            position: absolute; inset: 0;
            border-radius: 50%;
            background: linear-gradient(135deg, #0ea5e9, #22d3ee);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.4s;
            box-shadow: 0 0 30px rgba(34,211,238,0.2);
        }
        .orb svg { width: 32px; height: 32px; fill: white; }

        .orb-container.idle .orb {
            animation: breathe 4s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(34,211,238,0.2); }
            50% { transform: scale(1.04); box-shadow: 0 0 40px rgba(34,211,238,0.3); }
        }

        .orb-container.listening .orb {
            background: linear-gradient(135deg, #ef4444, #f87171);
            animation: none;
            box-shadow: 0 0 40px rgba(239,68,68,0.3);
        }
        .orb-container.listening .orb-ring {
            animation: ripple 1.5s ease-out infinite;
            border-color: rgba(239,68,68,0.3);
        }
        .orb-container.listening .orb-ring:nth-child(2) { animation-delay: 0.3s; }
        .orb-container.listening .orb-ring:nth-child(3) { animation-delay: 0.6s; }
        @keyframes ripple {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .orb-container.speaking .orb {
            background: linear-gradient(135deg, #22d3ee, #34d399);
            animation: speakPulse 0.8s ease-in-out infinite;
        }
        @keyframes speakPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        .orb-container.speaking .orb-ring {
            border-color: rgba(52,211,153,0.2);
            animation: speakRing 1.2s ease-in-out infinite;
        }
        @keyframes speakRing {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .orb-container.processing .orb {
            background: linear-gradient(135deg, #8b5cf6, #a78bfa);
        }
        .orb-container.processing .orb-ring {
            animation: processSpin 1.5s linear infinite;
            border-color: rgba(139,92,246,0.2);
        }
        @keyframes processSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .voice-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
            min-height: 18px;
        }

        .input-bar {
            display: flex; gap: 8px;
            padding: 8px 16px 20px;
        }
        .input-bar input {
            flex: 1; padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            background: var(--surface);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-bar input:focus { border-color: rgba(34,211,238,0.4); }
        .input-bar input::placeholder { color: var(--text-muted); }
        .input-bar button {
            padding: 12px 18px;
            border-radius: 14px;
            background: var(--surface2);
            border: 1px solid rgba(255,255,255,0.06);
            color: var(--accent);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .input-bar button:hover {
            background: var(--accent);
            color: var(--bg);
        }

        @media (max-height: 700px) {
            .header { padding: 16px 20px 8px; }
            .doctors { padding: 4px 16px; }
            .doc { padding: 8px 12px; }
            .voice-area { padding: 10px 20px 6px; }
            .orb-container { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>

<div class="ambient"></div>

<div class="app">
    <div class="header">
        <div class="logo"><span>City</span>Clinic</div>
        <div class="tagline">Voice-powered appointment booking</div>
    </div>

    <div class="doctors">
        <div class="doc">
            <h3>Dr. Priya Sharma</h3>
            <div class="specialty">General Medicine</div>
            <div class="hours">Mon–Fri · 9 AM – 5 PM</div>
        </div>
        <div class="doc">
            <h3>Dr. Rahul Patel</h3>
            <div class="specialty">Pediatrics</div>
            <div class="hours">Mon–Fri · 9 AM – 5 PM</div>
        </div>
    </div>

    <div class="chat" id="chat"></div>

    <div class="voice-area">
        <div class="orb-container idle" id="orbContainer" onclick="toggleListening()">
            <div class="orb-ring"></div>
            <div class="orb-ring"></div>
            <div class="orb-ring"></div>
            <div class="orb">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            </div>
        </div>
        <div class="voice-label" id="voiceLabel">tap to speak</div>
    </div>

    <div class="input-bar">
        <input type="text" id="textInput" placeholder="Type instead..." onkeypress="if(event.key==='Enter')sendText()">
        <button onclick="sendText()">Send</button>
    </div>
</div>

<script>
    const API_URL = "https://voice-appointment-booking.onrender.com";
    const sessionId = "s-" + Date.now() + "-" + Math.random().toString(36).slice(2, 6);
    let isListening = false;
    let recognition = null;
    let isSpeaking = false;

    const orb = document.getElementById("orbContainer");
    const label = document.getElementById("voiceLabel");
    const chat = document.getElementById("chat");

    function setOrbState(state) {
        orb.className = "orb-container " + state;
        const labels = {
            idle: "tap to speak",
            listening: "listening...",
            speaking: "speaking...",
            processing: "thinking...",
        };
        label.textContent = labels[state] || "";
    }

    function initSpeechRecognition() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
            addBubble("Speech recognition not supported. Please use Chrome or Edge.", "ai");
            return;
        }
        recognition = new SR();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = "en-US";

        recognition.onresult = (e) => {
            const text = e.results[0][0].transcript;
            isListening = false;
            addBubble(text, "user");
            sendToBackend(text);
        };

        recognition.onerror = (e) => {
            console.error("Speech error:", e.error);
            isListening = false;
            if (e.error === "no-speech") {
                setOrbState("idle");
                label.textContent = "no speech heard — tap again";
            } else if (e.error === "not-allowed") {
                setOrbState("idle");
                label.textContent = "mic blocked — please allow access";
            } else {
                setOrbState("idle");
            }
        };

        recognition.onend = () => {
            if (isListening) {
                isListening = false;
                setOrbState("idle");
            }
        };
    }

    function toggleListening() {
        if (isSpeaking) {
            window.speechSynthesis.cancel();
            isSpeaking = false;
        }
        if (isListening) {
            recognition.stop();
            isListening = false;
            setOrbState("idle");
        } else {
            startListening();
        }
    }

    function startListening() {
        if (!recognition) initSpeechRecognition();
        if (!recognition) return;
        isListening = true;
        setOrbState("listening");
        try {
            recognition.start();
        } catch (e) {
            console.error(e);
            isListening = false;
            setOrbState("idle");
        }
    }

    function addBubble(text, type) {
        const div = document.createElement("div");
        div.className = "bubble " + type;
        div.textContent = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    async function sendToBackend(text) {
        setOrbState("processing");
        try {
            const resp = await fetch(`${API_URL}/api/chat`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ session_id: sessionId, message: text }),
            });
            const data = await resp.json();

            if (data.booking_confirmed) {
                addBubble(data.reply, "confirmed");
            } else {
                addBubble(data.reply, "ai");
            }
            speak(data.reply);
        } catch (err) {
            console.error(err);
            addBubble("Connection issue — please try again.", "ai");
            setOrbState("idle");
        }
    }

    function speak(text) {
        if (!window.speechSynthesis) {
            setOrbState("idle");
            return;
        }
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.rate = 1.05;
        u.pitch = 1.0;
        u.lang = "en-US";
        isSpeaking = true;
        setOrbState("speaking");

        u.onend = () => {
            isSpeaking = false;
            // Auto-listen after AI finishes speaking — feels like a real call
            setTimeout(() => startListening(), 600);
        };

        window.speechSynthesis.speak(u);
    }

    function sendText() {
        const input = document.getElementById("textInput");
        const text = input.value.trim();
        if (!text) return;
        input.value = "";
        if (isSpeaking) {
            window.speechSynthesis.cancel();
            isSpeaking = false;
        }
        addBubble(text, "user");
        sendToBackend(text);
    }

    // Boot — AI introduces itself by voice only, no pre-written text on screen
    window.onload = () => {
        initSpeechRecognition();
        const welcome = "Hi there! Welcome to City Clinic. I'm your voice assistant and I'm here to help you book a doctor's appointment. We have Dr. Priya Sharma for General Medicine and Dr. Rahul Patel for Pediatrics. Just tell me which doctor you'd like to see and I'll take care of the rest!";
        setTimeout(() => speak(welcome), 1000);
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Clinic — Voice Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060a14;
            --text: #e2e8f0;
            --dim: #64748b;
            --muted: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Ambient glow */
        .glow {
            position: fixed;
            width: 500px; height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            pointer-events: none;
            transition: all 1.5s ease;
        }
        .glow-1 { background: #22d3ee; top: -150px; left: -100px; }
        .glow-2 { background: #8b5cf6; bottom: -150px; right: -100px; }

        /* State-based ambient color */
        body.state-listening .glow-1 { background: #ef4444; opacity: 0.18; }
        body.state-speaking .glow-1 { background: #22d3ee; opacity: 0.2; }
        body.state-processing .glow-1 { background: #8b5cf6; opacity: 0.15; }

        /* Header */
        .brand {
            position: absolute;
            top: 40px;
            text-align: center;
        }
        .brand h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--dim);
            letter-spacing: -0.5px;
        }
        .brand h1 em {
            font-style: normal;
            color: #22d3ee;
        }

        /* Center orb */
        .orb-wrap {
            position: relative;
            width: 180px; height: 180px;
            cursor: pointer;
            margin-bottom: 30px;
        }

        /* Rings */
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.05);
            transition: all 0.6s ease;
        }
        .ring-1 { inset: -20px; }
        .ring-2 { inset: -45px; }
        .ring-3 { inset: -70px; }

        /* Core orb */
        .orb-core {
            position: absolute; inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #1e293b 0%, #0f172a 100%);
            border: 1.5px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        .orb-core svg {
            width: 44px; height: 44px;
            fill: var(--dim);
            transition: all 0.4s;
        }

        /* ===== IDLE STATE ===== */
        .orb-wrap.idle .orb-core {
            animation: idleBreathe 5s ease-in-out infinite;
        }
        .orb-wrap.idle .orb-core svg { fill: var(--dim); }
        @keyframes idleBreathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(0,0,0,0.5); }
            50% { transform: scale(1.02); box-shadow: 0 0 50px rgba(34,211,238,0.1); }
        }

        /* ===== LISTENING STATE ===== */
        .orb-wrap.listening .orb-core {
            background: radial-gradient(circle at 35% 35%, #7f1d1d 0%, #450a0a 100%);
            border-color: rgba(239,68,68,0.4);
            box-shadow: 0 0 60px rgba(239,68,68,0.25);
            animation: none;
        }
        .orb-wrap.listening .orb-core svg { fill: #fca5a5; }
        .orb-wrap.listening .ring {
            border-color: rgba(239,68,68,0.15);
            animation: listenRipple 2s ease-out infinite;
        }
        .orb-wrap.listening .ring-2 { animation-delay: 0.4s; }
        .orb-wrap.listening .ring-3 { animation-delay: 0.8s; }
        @keyframes listenRipple {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        /* ===== SPEAKING STATE ===== */
        .orb-wrap.speaking .orb-core {
            background: radial-gradient(circle at 35% 35%, #164e63 0%, #083344 100%);
            border-color: rgba(34,211,238,0.4);
            box-shadow: 0 0 60px rgba(34,211,238,0.2);
            animation: speakPulse 1s ease-in-out infinite;
        }
        .orb-wrap.speaking .orb-core svg { fill: #67e8f9; }
        .orb-wrap.speaking .ring {
            border-color: rgba(34,211,238,0.1);
            animation: speakWave 1.5s ease-in-out infinite;
        }
        .orb-wrap.speaking .ring-2 { animation-delay: 0.2s; }
        .orb-wrap.speaking .ring-3 { animation-delay: 0.4s; }
        @keyframes speakPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes speakWave {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.08); opacity: 1; }
        }

        /* ===== PROCESSING STATE ===== */
        .orb-wrap.processing .orb-core {
            background: radial-gradient(circle at 35% 35%, #2e1065 0%, #1e1b4b 100%);
            border-color: rgba(139,92,246,0.4);
            box-shadow: 0 0 60px rgba(139,92,246,0.2);
            animation: processGlow 2s ease-in-out infinite;
        }
        .orb-wrap.processing .orb-core svg { fill: #c4b5fd; }
        .orb-wrap.processing .ring {
            border-color: rgba(139,92,246,0.1);
            animation: processRotate 3s linear infinite;
        }
        @keyframes processGlow {
            0%, 100% { box-shadow: 0 0 40px rgba(139,92,246,0.15); }
            50% { box-shadow: 0 0 80px rgba(139,92,246,0.3); }
        }
        @keyframes processRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Status text */
        .status {
            text-align: center;
            min-height: 60px;
        }
        .status-main {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--dim);
            transition: color 0.5s;
        }
        body.state-listening .status-main { color: #f87171; }
        body.state-speaking .status-main { color: #22d3ee; }
        body.state-processing .status-main { color: #a78bfa; }

        .status-sub {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 6px;
        }

        /* Transcript — small subtle text at bottom */
        .transcript {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 400px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--muted);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }
        .transcript.visible {
            opacity: 1;
        }

        /* Doctor info — very subtle at top */
        .doctors {
            position: absolute;
            top: 90px;
            display: flex;
            gap: 30px;
            opacity: 0.4;
        }
        .doctors span {
            font-size: 0.7rem;
            color: var(--dim);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body class="state-idle">

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="brand">
    <h1><em>City</em>Clinic</h1>
</div>

<div class="doctors">
    <span>Dr. Sharma · General Medicine</span>
    <span>Dr. Patel · Pediatrics</span>
</div>

<div class="orb-wrap idle" id="orb" onclick="handleOrbClick()">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="orb-core">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </div>
</div>

<div class="status">
    <div class="status-main" id="statusMain">tap to begin</div>
    <div class="status-sub" id="statusSub">voice-powered booking</div>
</div>

<div class="transcript" id="transcript"></div>

<script>
    const API_URL = "http://localhost:8000";
    const sessionId = "s-" + Date.now() + "-" + Math.random().toString(36).slice(2,6);
    let isListening = false;
    let isSpeaking = false;
    let recognition = null;
    let hasStarted = false;

    const orbEl = document.getElementById("orb");
    const mainStatus = document.getElementById("statusMain");
    const subStatus = document.getElementById("statusSub");
    const transcriptEl = document.getElementById("transcript");

    function setState(state) {
        orbEl.className = "orb-wrap " + state;
        document.body.className = "state-" + state;
        const labels = {
            idle: ["tap to speak", ""],
            listening: ["listening", "speak now..."],
            speaking: ["speaking", ""],
            processing: ["thinking", "one moment..."],
        };
        const [main, sub] = labels[state] || ["", ""];
        mainStatus.textContent = main;
        subStatus.textContent = sub;
    }

    function showTranscript(text) {
        transcriptEl.textContent = text;
        transcriptEl.classList.add("visible");
        setTimeout(() => transcriptEl.classList.remove("visible"), 4000);
    }

    function initSpeech() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
            mainStatus.textContent = "use chrome or edge";
            return;
        }
        recognition = new SR();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = "en-US";

        recognition.onresult = (e) => {
            const text = e.results[0][0].transcript;
            isListening = false;
            showTranscript("You: " + text);
            sendToBackend(text);
        };

        recognition.onerror = (e) => {
            isListening = false;
            if (e.error === "no-speech") {
                setState("idle");
                mainStatus.textContent = "didn't hear that";
                subStatus.textContent = "tap to try again";
            } else if (e.error === "not-allowed") {
                setState("idle");
                mainStatus.textContent = "mic blocked";
                subStatus.textContent = "allow microphone access";
            } else {
                setState("idle");
            }
        };

        recognition.onend = () => {
            if (isListening) {
                isListening = false;
                setState("idle");
            }
        };
    }

    function handleOrbClick() {
        if (!hasStarted) {
            // First click — start the whole experience
            hasStarted = true;
            const welcome = "Hi there! Welcome to City Clinic. I'm your voice assistant. I can help you book an appointment with Dr. Sharma for General Medicine or Dr. Patel for Pediatrics. Which doctor would you like to see?";
            speak(welcome);
            return;
        }

        if (isSpeaking) {
            window.speechSynthesis.cancel();
            isSpeaking = false;
            setState("idle");
            return;
        }

        if (isListening) {
            recognition.stop();
            isListening = false;
            setState("idle");
        } else {
            startListening();
        }
    }

    function startListening() {
        if (!recognition) initSpeech();
        if (!recognition) return;
        isListening = true;
        setState("listening");
        try {
            recognition.start();
        } catch(e) {
            isListening = false;
            setState("idle");
        }
    }

    async function sendToBackend(text) {
        setState("processing");
        try {
            const resp = await fetch(`${API_URL}/api/chat`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ session_id: sessionId, message: text }),
            });
            const data = await resp.json();
            speak(data.reply);
            if (data.booking_confirmed) {
                subStatus.textContent = "✅ appointment confirmed!";
            }
        } catch(err) {
            console.error(err);
            speak("I'm having trouble connecting. Please try again in a moment.");
        }
    }

    function speak(text) {
        if (!window.speechSynthesis) {
            setState("idle");
            return;
        }
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.rate = 1.05;
        u.pitch = 1.0;
        u.lang = "en-US";
        isSpeaking = true;
        setState("speaking");

        u.onend = () => {
            isSpeaking = false;
            // Auto-listen after AI finishes
            setTimeout(() => startListening(), 500);
        };

        window.speechSynthesis.speak(u);
    }

    // Boot
    window.onload = () => {
        initSpeech();
        // Wake up backend silently
        fetch(`${API_URL}/health`).catch(() => {});
    };
</script>
</body>
</html>

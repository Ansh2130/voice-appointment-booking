<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Clinic - Voice Appointment Booking</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            padding: 30px 20px 10px;
        }
        .header h1 { font-size: 1.8rem; color: #38bdf8; }
        .header p { color: #94a3b8; margin-top: 5px; font-size: 0.95rem; }

        .doctors {
            display: flex; gap: 15px; justify-content: center;
            margin: 15px 0; flex-wrap: wrap; padding: 0 20px;
        }
        .doctor-card {
            background: #1e293b; border-radius: 12px; padding: 15px 20px;
            border: 1px solid #334155; min-width: 200px; text-align: center;
        }
        .doctor-card h3 { color: #38bdf8; font-size: 1rem; }
        .doctor-card p { color: #94a3b8; font-size: 0.8rem; margin-top: 4px; }

        .chat-container {
            width: 100%; max-width: 600px; flex: 1;
            display: flex; flex-direction: column;
            padding: 10px 20px;
        }
        .messages {
            flex: 1; overflow-y: auto; padding: 10px 0;
            display: flex; flex-direction: column; gap: 10px;
            max-height: 45vh;
        }
        .msg {
            max-width: 80%; padding: 12px 16px;
            border-radius: 16px; font-size: 0.95rem;
            line-height: 1.4; word-wrap: break-word;
        }
        .msg.bot {
            background: #1e293b; align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .msg.user {
            background: #0ea5e9; color: white; align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .msg.success {
            background: #065f46; border: 1px solid #10b981;
            align-self: flex-start;
        }

        .controls {
            display: flex; flex-direction: column; align-items: center;
            gap: 10px; padding: 20px 0;
        }
        .mic-btn {
            width: 80px; height: 80px; border-radius: 50%;
            background: #0ea5e9; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s; position: relative;
        }
        .mic-btn:hover { background: #0284c7; transform: scale(1.05); }
        .mic-btn.listening {
            background: #ef4444;
            animation: pulse 1.5s infinite;
        }
        .mic-btn svg { width: 36px; height: 36px; fill: white; }
        .status { color: #94a3b8; font-size: 0.85rem; min-height: 20px; }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
            50% { box-shadow: 0 0 0 20px rgba(239,68,68,0); }
        }

        .text-input {
            display: flex; gap: 8px; width: 100%; max-width: 600px;
            padding: 0 20px 20px;
        }
        .text-input input {
            flex: 1; padding: 12px 16px; border-radius: 12px;
            border: 1px solid #334155; background: #1e293b;
            color: #e2e8f0; font-size: 0.95rem; outline: none;
        }
        .text-input input:focus { border-color: #0ea5e9; }
        .text-input button {
            padding: 12px 20px; border-radius: 12px;
            background: #0ea5e9; color: white; border: none;
            cursor: pointer; font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🏥 City Clinic</h1>
    <p>Speak to book your appointment — no forms needed</p>
</div>

<div class="doctors">
    <div class="doctor-card">
        <h3>Dr. Priya Sharma</h3>
        <p>General Medicine</p>
        <p>Mon-Fri, 9 AM - 5 PM</p>
    </div>
    <div class="doctor-card">
        <h3>Dr. Rahul Patel</h3>
        <p>Pediatrics</p>
        <p>Mon-Fri, 9 AM - 5 PM</p>
    </div>
</div>

<div class="chat-container">
    <div class="messages" id="messages"></div>
</div>

<div class="controls">
    <button class="mic-btn" id="micBtn" onclick="toggleListening()">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <div class="status" id="status">Tap the mic and speak your request</div>
</div>

<div class="text-input">
    <input type="text" id="textInput" placeholder="Or type your message here..." onkeypress="if(event.key==='Enter')sendText()">
    <button onclick="sendText()">Send</button>
</div>

<script>
    // CONFIG - Change this to your deployed backend URL
    const API_URL = "https://voice-appointment-booking.onrender.com";
    const sessionId = "session-" + Date.now();
    let isListening = false;
    let recognition = null;
    let isSpeaking = false;

    // Init speech recognition
    function initSpeechRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            setStatus("Speech recognition not supported. Please use Chrome or Edge.");
            return;
        }
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = "en-US";

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            setStatus("");
            addMessage(text, "user");
            sendToBackend(text);
        };

        recognition.onerror = (event) => {
            console.error("Speech error:", event.error);
            if (event.error === "no-speech") {
                setStatus("No speech detected. Try again.");
            } else if (event.error === "not-allowed") {
                setStatus("Mic access denied. Please allow microphone.");
            } else {
                setStatus("Error: " + event.error + ". Try again.");
            }
            stopListening();
        };

        recognition.onend = () => {
            stopListening();
        };
    }

    function toggleListening() {
        if (isSpeaking) {
            window.speechSynthesis.cancel();
            isSpeaking = false;
        }
        if (isListening) {
            recognition.stop();
            stopListening();
        } else {
            startListening();
        }
    }

    function startListening() {
        if (!recognition) initSpeechRecognition();
        if (!recognition) return;
        isListening = true;
        document.getElementById("micBtn").classList.add("listening");
        setStatus("🎙️ Listening... speak now");
        recognition.start();
    }

    function stopListening() {
        isListening = false;
        document.getElementById("micBtn").classList.remove("listening");
        setStatus("Tap the mic and speak your request");
    }

    function addMessage(text, type) {
        const div = document.createElement("div");
        div.className = `msg ${type}`;
        div.textContent = text;
        const container = document.getElementById("messages");
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function setStatus(text) {
        document.getElementById("status").textContent = text;
    }

    async function sendToBackend(text) {
        setStatus("Thinking...");
        try {
            const resp = await fetch(`${API_URL}/api/chat`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ session_id: sessionId, message: text }),
            });
            const data = await resp.json();

            if (data.booking_confirmed) {
                addMessage("✅ " + data.reply, "success");
            } else {
                addMessage(data.reply, "bot");
            }

            // Speak the response
            speak(data.reply);
        } catch (err) {
            console.error(err);
            addMessage("Sorry, something went wrong. Please try again.", "bot");
            setStatus("Error connecting to server");
        }
    }

    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        utterance.lang = "en-US";
        isSpeaking = true;

        utterance.onend = () => {
            isSpeaking = false;
            setStatus("Tap the mic to respond");
        };

        window.speechSynthesis.speak(utterance);
        setStatus("🔊 Speaking...");
    }

    function sendText() {
        const input = document.getElementById("textInput");
        const text = input.value.trim();
        if (!text) return;
        input.value = "";
        addMessage(text, "user");
        sendToBackend(text);
    }

    // Welcome message on load
    window.onload = () => {
        initSpeechRecognition();
        const welcome = "Welcome to City Clinic! I can help you book an appointment with Dr. Sharma or Dr. Patel. Just tap the microphone and tell me what you need.";
        addMessage(welcome, "bot");
        setTimeout(() => speak(welcome), 500);
    };
</script>
</body>
</html>
